<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Login Settings</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="header-icon">🔐</div>
      <h1>Auto Login</h1>
      <p class="subtitle">Sophos Captive Portal</p>
    </div>

    <!-- Primary Credentials -->
    <div class="section">
      <div class="section-header">
        <span class="badge primary-badge">Primary</span>
        <h2>Main Credentials</h2>
      </div>
      <div class="form-group">
        <label for="primary-user">Username</label>
        <div class="input-wrapper">
          <input type="text" id="primary-user" placeholder="e.g. BTECH1019525" autocomplete="off" spellcheck="false">
        </div>
      </div>
      <div class="form-group">
        <label for="primary-pass">Password</label>
        <div class="input-wrapper">
          <input type="password" id="primary-pass" placeholder="Enter password" autocomplete="off">
          <button class="toggle-vis" data-target="primary-pass" title="Toggle visibility">
            <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      <div id="primary-status" class="cred-status"></div>
    </div>

    <!-- Fallback Credentials -->
    <div class="section">
      <div class="section-header">
        <span class="badge fallback-badge">Fallback</span>
        <h2>Backup Credentials</h2>
        <span class="optional-tag">Optional</span>
      </div>
      <p class="section-desc">Used automatically if the primary login fails.</p>

      <div id="fallback-list"></div>

      <button id="add-fallback-btn" class="add-btn" title="Add fallback credential">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Add Fallback
      </button>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button id="save-btn" class="btn-save">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
        </svg>
        Save Credentials
      </button>
      <button id="clear-btn" class="btn-clear">Clear All</button>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
